services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      - VITE_PORT=${FRONTEND_PORT:-3000}
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8080}
      - TZ=${TZ:-UTC}
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    environment:
      - PORT=${BACKEND_PORT:-8080}
      - TZ=${TZ:-UTC}
    volumes:
      - ./backend:/app:z
    command: go run .